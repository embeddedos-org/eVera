codecov:
  require_ci_to_pass: false

coverage:
  precision: 2
  round: down
  range: "50...90"

  status:
    project:
      default:
        target: auto
        threshold: 5%
        informational: true
    patch:
      default:
        target: 70%
        threshold: 5%
        informational: true

  # Focus coverage on agent code
  paths:
    - "vera/"

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true
  hide_project_coverage: false

flags:
  unittests:
    paths:
      - vera/
    carryforward: true

ignore:
  - "tests/"
  - "scripts/"
  - "docs/"
  - "electron/"
  - "mobile/"
  - "extension/"
  - "plugins/"
  - "*.spec"
  - "setup_vera.py"
  - "build_backend.py"
  - "deploy.py"
  - "generate_icons.py"
  - "verify.py"
  - "validate_e2e.py"
  - "audit.py"
