<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>eVera — Settings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            max-width: 600px;
            margin: 0 auto;
            padding: 32px 24px;
            background: #0a0e1a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        h1 {
            font-size: 24px;
            color: #60a5fa;
            margin-bottom: 24px;
        }
        .field {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 600;
            color: #aaa;
        }
        input, select {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
        }
        input:focus, select:focus {
            border-color: rgba(96, 165, 250, 0.4);
        }
        .save-btn {
            padding: 12px 24px;
            background: rgba(96, 165, 250, 0.2);
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 10px;
            color: #60a5fa;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .save-btn:hover {
            background: rgba(96, 165, 250, 0.3);
        }
        .status {
            margin-top: 12px;
            font-size: 13px;
            color: #4ade80;
            display: none;
        }
    </style>
</head>
<body>
    <h1>🤖 eVera Settings</h1>

    <div class="field">
        <label>Server URL</label>
        <input type="text" id="serverUrl" placeholder="http://localhost:8000">
    </div>

    <div class="field">
        <label>Default Model (optional)</label>
        <input type="text" id="defaultModel" placeholder="e.g. gpt-4o-mini">
    </div>

    <div class="field">
        <label>
            <input type="checkbox" id="showOverlay" checked style="width: auto; margin-right: 8px;">
            Show floating toolbar on text selection
        </label>
    </div>

    <button class="save-btn" id="saveBtn">Save Settings</button>
    <div class="status" id="saveStatus">✅ Settings saved!</div>

    <script src="options.js"></script>
</body>
</html>
