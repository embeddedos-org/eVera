<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eVera — AI Copilot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100%; height: 100vh;
            background: #0a0e1a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 12px 16px;
            background: rgba(15, 20, 35, 0.9);
            border-bottom: 1px solid rgba(96, 165, 250, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header .title {
            font-size: 16px;
            font-weight: 700;
            color: #60a5fa;
        }
        .header .status {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #6b7280;
        }
        .header .status.connected { background: #4ade80; }

        /* Chat area */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 90%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .msg.user {
            align-self: flex-end;
            background: rgba(96, 165, 250, 0.2);
            border: 1px solid rgba(96, 165, 250, 0.3);
        }
        .msg.bot {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .msg .meta {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }

        /* Input */
        .input-area {
            padding: 12px 16px;
            background: rgba(15, 20, 35, 0.9);
            border-top: 1px solid rgba(96, 165, 250, 0.2);
            display: flex;
            gap: 8px;
        }
        .input-area input {
            flex: 1;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px 14px;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
        }
        .input-area input:focus {
            border-color: rgba(96, 165, 250, 0.4);
        }
        .input-area button {
            background: rgba(96, 165, 250, 0.2);
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 10px;
            padding: 10px 16px;
            color: #60a5fa;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .input-area button:hover {
            background: rgba(96, 165, 250, 0.3);
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="title">🤖 eVera</span>
        <div class="status" id="statusDot"></div>
    </div>

    <div class="chat" id="chatArea"></div>

    <div class="input-area">
        <input type="text" id="chatInput" placeholder="Ask eVera anything..." autofocus>
        <button id="sendBtn">Send</button>
    </div>

    <script src="sidepanel.js"></script>
</body>
</html>
