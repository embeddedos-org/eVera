# ============================================================
# eVera — Nginx Virtual Host Configuration
# Handles: HTTP→HTTPS redirect, HTTPS, WebSocket proxying
# Replace YOUR_DOMAIN with your actual domain name
# ============================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name evera.embeddedos.org evera-api.embeddedos.org;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Main eVera server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name evera.embeddedos.org evera-api.embeddedos.org;

    # TLS configuration
    ssl_certificate     /etc/letsencrypt/live/evera.embeddedos.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/evera.embeddedos.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(self), camera=()" always;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
    proxy_buffering off;

    # WebSocket support
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # WebSocket endpoints (no rate limit — long-lived connections)
    location ~ ^/ws {
        limit_req zone=ws burst=5 nodelay;
        proxy_pass http://vera:8000;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SSE (Server-Sent Events) — no buffering
    location ~ ^/(events|agents)/stream {
        proxy_pass http://vera:8000;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        add_header Cache-Control "no-cache";
        add_header X-Accel-Buffering "no";
    }

    # Static files — aggressive caching
    location /static/ {
        proxy_pass http://vera:8000;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
    }

    # API endpoints — rate limited
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://vera:8000;
    }

    # Health check — no auth, no rate limit
    location /health {
        proxy_pass http://vera:8000;
        access_log off;
    }

    # All other requests
    location / {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://vera:8000;
    }

    # Block common attack paths
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
