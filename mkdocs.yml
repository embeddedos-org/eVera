site_name: eVera
site_description: EmbeddedOS — eVera documentation
site_url: https://embeddedos-org.github.io/eVera/
repo_url: https://github.com/embeddedos-org/eVera
repo_name: embeddedos-org/eVera
edit_uri: edit/master/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
    - scheme: slate
      primary: indigo

docs_dir: docs
plugins:
  - search

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
