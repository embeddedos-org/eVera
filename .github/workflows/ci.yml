name: Voca CI/CD

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # 1. LINT & FORMAT CHECK
  # ============================================================
  lint:
    name: 🧹 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Lint check
        run: ruff check . --output-format=github

      - name: Format check
        run: ruff format --check . || true

  # ============================================================
  # 2. TEST
  # ============================================================
  test:
    name: 🧪 Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest pytest-asyncio pytest-cov httpx ruff

      - name: Run tests
        run: pytest tests/ -v -m "not slow" --tb=short

      - name: Run tests with coverage
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: pytest tests/ --cov=voca --cov-report=xml --cov-report=term -m "not slow"

      - name: Upload coverage
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ============================================================
  # 3. SECURITY SCAN
  # ============================================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety
        run: pip install safety bandit

      - name: Check dependencies for vulnerabilities
        run: safety check -r requirements.txt || true

      - name: Bandit security scan
        run: bandit -r voca/ -ll --skip B101 || true

  # ============================================================
  # 4. BUILD — Cross-Platform Standalone Installers
  # ============================================================
  build:
    name: 📦 Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact_pattern: "Voca-Setup-*.exe"
            artifact_name: voca-windows
          - os: macos-latest
            platform: mac
            artifact_pattern: "Voca-*.dmg"
            artifact_name: voca-macos
          - os: ubuntu-latest
            platform: linux
            artifact_pattern: "Voca-*.AppImage"
            artifact_name: voca-linux
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Python backend (PyInstaller)
        run: python build_backend.py --clean

      - name: Verify backend build
        run: |
          ls dist/voca-server/
        shell: bash

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      - name: Build Electron app
        working-directory: electron
        run: npx electron-builder --${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: electron/dist/${{ matrix.artifact_pattern }}
          if-no-files-found: warn

  # ============================================================
  # 5. RELEASE — Create GitHub Release with all platform installers
  # ============================================================
  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List artifacts
        run: find release-artifacts -type f | head -20

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline --pretty=format:"- %s" HEAD)
          else
            CHANGES=$(git log --oneline --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          echo "CHANGES<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.CHANGES }}

            ## 📥 Download & Install

            | Platform | Download | Install |
            |----------|----------|---------|
            | **Windows** | `Voca-Setup-*.exe` | Run the installer |
            | **macOS** | `Voca-*.dmg` | Open DMG → drag to Applications |
            | **Linux** | `Voca-*.AppImage` | `chmod +x Voca-*.AppImage && ./Voca-*.AppImage` |

            ## 🐍 From Source
            ```bash
            git clone https://github.com/patchava-sr/eVoca.git && cd eVoca
            python -m venv .venv && source .venv/bin/activate
            pip install -r requirements.txt
            python main.py --mode server
            ```
          generate_release_notes: true
