name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ─── Desktop (Electron) ─────────────────────────────────────
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Python backend
        run: python build_backend.py --clean

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      - name: Build Electron installer
        working-directory: electron
        run: node build.js --skip-backend ${{ matrix.platform }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            electron/dist/*.exe
            electron/dist/*.dmg
            electron/dist/*.AppImage
            electron/dist/*.deb
          if-no-files-found: warn

  # ─── Mobile Android (APK) ───────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm install

      - name: Generate Android project
        working-directory: mobile
        run: |
          npx --yes @react-native-community/cli init VocaMobileTemp --skip-install --skip-git-init
          cp -r VocaMobileTemp/android ./
          rm -rf VocaMobileTemp

      - name: Build release APK
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

  # ─── Mobile iOS (IPA) ──────────────────────────────────────
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm install

      - name: Generate iOS project
        working-directory: mobile
        run: |
          npx --yes @react-native-community/cli init VocaMobileTemp --skip-install --skip-git-init
          cp -r VocaMobileTemp/ios ./
          rm -rf VocaMobileTemp

      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install || true

      - name: Build iOS archive (unsigned)
        working-directory: mobile/ios
        run: |
          xcodebuild \
            -workspace *.xcworkspace \
            -scheme VocaMobileTemp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Voca.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO || true

      - name: Upload iOS archive
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive
          path: mobile/ios/build/Voca.xcarchive
          if-no-files-found: warn

  # ─── Create GitHub Release ─────────────────────────────────
  release:
    needs: [build-desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.apk
          draft: true
          generate_release_notes: true
