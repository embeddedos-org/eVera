name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test suite (use for hotfix releases)'
        required: false
        default: 'false'
        type: boolean

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # ─── Pre-flight: Lint + Test + Frontend ──────────────────────
  preflight:
    name: ✅ Pre-flight checks
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx ruff

      - name: Lint
        run: ruff check . --output-format=github

      - name: Test
        run: pytest tests/ -v -m "not slow" --tb=short

      - name: Verify frontend assets
        run: |
          test -f vera/static/face.js
          test -f vera/static/app.js
          test -f vera/static/index.html
          test -f vera/static/lib/three.min.js
          grep -q "Content-Security-Policy" vera/static/index.html
          grep -q "setExpression," vera/static/face.js
          grep -q "setSpeakAmplitude," vera/static/face.js
          echo "✅ Frontend validation passed"

  # ─── Desktop (Electron) ─────────────────────────────────────
  build-desktop:
    name: 📦 Desktop (${{ matrix.platform }})
    needs: [preflight]
    if: ${{ !failure() && !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact_pattern: "Vera-Setup-*.exe"
          - os: macos-latest
            platform: mac
            artifact_pattern: "Vera-*.dmg"
          - os: ubuntu-latest
            platform: linux
            artifact_pattern: "Vera-*.AppImage"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Python backend (PyInstaller)
        run: python build_backend.py --clean
        env:
          PYTHONUTF8: '1'
          PYTHONIOENCODING: utf-8

      - name: Verify backend build
        run: ls dist/vera-server/
        shell: bash

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      - name: Build Electron installer
        working-directory: electron
        run: npx electron-builder --${{ matrix.platform }} --publish never

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            electron/dist/*.exe
            electron/dist/*.dmg
            electron/dist/*.AppImage
            electron/dist/*.deb
          if-no-files-found: warn

  # ─── Mobile Android (APK) ───────────────────────────────────
  build-android:
    name: 📱 Android APK
    needs: [preflight]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm install

      - name: Generate Android project
        working-directory: mobile
        run: |
          npx --yes @react-native-community/cli@latest init VeraMobileTemp --skip-install --skip-git-init || true
          if [ -d "VeraMobileTemp/android" ]; then
            cp -r VeraMobileTemp/android ./
          elif [ -d "VeraMobileTemp/VeraMobileTemp/android" ]; then
            cp -r VeraMobileTemp/VeraMobileTemp/android ./
          else
            echo "Android template not found, listing structure:"
            find VeraMobileTemp -maxdepth 3 -type d 2>/dev/null || true
            echo "Skipping Android build"
            exit 1
          fi
          rm -rf VeraMobileTemp

      - name: Build release APK
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

  # ─── Mobile iOS (IPA) ──────────────────────────────────────
  build-ios:
    name: 🍎 iOS Archive
    needs: [preflight]
    if: ${{ !failure() && !cancelled() }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm install

      - name: Generate iOS project
        working-directory: mobile
        run: |
          npx --yes @react-native-community/cli@latest init VeraMobileTemp --skip-install --skip-git-init || true
          if [ -d "VeraMobileTemp/ios" ]; then
            cp -r VeraMobileTemp/ios ./
          elif [ -d "VeraMobileTemp/VeraMobileTemp/ios" ]; then
            cp -r VeraMobileTemp/VeraMobileTemp/ios ./
          else
            echo "iOS template not found, listing structure:"
            find VeraMobileTemp -maxdepth 3 -type d 2>/dev/null || true
            echo "Skipping iOS build"
            exit 1
          fi
          rm -rf VeraMobileTemp

      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install || true

      - name: Build iOS archive (unsigned)
        working-directory: mobile/ios
        run: |
          xcodebuild \
            -workspace *.xcworkspace \
            -scheme VeraMobileTemp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Vera.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO || true

      - name: Upload iOS archive
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive
          path: mobile/ios/build/Vera.xcarchive
          if-no-files-found: warn

  # ─── Create GitHub Release ─────────────────────────────────
  release:
    name: 🚀 GitHub Release
    needs: [build-desktop, build-android, build-ios]
    if: ${{ startsWith(github.ref, 'refs/tags/v') && always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline --pretty=format:"- %s" HEAD)
          else
            CHANGES=$(git log --oneline --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          echo "CHANGES<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.apk
          body: |
            ## 🚀 eVera ${{ github.ref_name }}

            ### What's Changed
            ${{ steps.changelog.outputs.CHANGES }}

            ### ✨ Highlights
            - 🎭 3D Holographic Avatar with Three.js WebGL
            - 🤖 8 gesture animations auto-triggered by expression
            - 🛡️ Production hardened with WebGL fallback, CSP, FPS monitoring
            - 🔒 Content Security Policy, SRI CDN loading, local fallback

            ### 📥 Download & Install

            | Platform | Download | Install |
            |----------|----------|---------|
            | **Windows** | `Vera-Setup-*.exe` | Run the installer |
            | **macOS** | `Vera-*.dmg` | Open DMG → drag to Applications |
            | **Linux** | `Vera-*.AppImage` | `chmod +x Vera-*.AppImage && ./Vera-*.AppImage` |
            | **Android** | `Vera-*.apk` | Enable unknown sources → install APK |

            ## 🐍 From Source
            ```bash
            git clone https://github.com/srpatcha/eVera.git && cd eVera
            python -m venv .venv && source .venv/bin/activate
            pip install -r requirements.txt
            python main.py --mode server
            ```
          generate_release_notes: true
