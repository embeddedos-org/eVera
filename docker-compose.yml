services:
  voca:
    build: .
    ports:
      - "8000:8000"
    environment:
      - VOCA_LLM__OLLAMA_URL=http://ollama:11434
      - VOCA_DEBUG=false
    volumes:
      - voca-data:/app/data
      - ./.env:/app/.env:ro
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    # Pull default model on first start:
    # docker exec -it evoca-ollama-1 ollama pull llama3.2

volumes:
  voca-data:
  ollama-models:
