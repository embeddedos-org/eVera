<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vera — AI Buddy</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0a0e1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' http://localhost:* http://127.0.0.1:*; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:* wss:; img-src 'self' data: blob: http://localhost:*; font-src 'self'; media-src 'self' blob:; worker-src 'self' blob:;">
    <meta name="X-Content-Type-Options" content="nosniff">
    <meta name="Referrer-Policy" content="strict-origin-when-cross-origin">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Animated particle background -->
    <div class="particle-field" id="particleField"></div>

    <div class="app">
        <!-- Glass Header -->
        <header class="glass-header">
            <div class="header-left">
                <div class="logo">
                    <span class="logo-icon">🎙️</span>
                    <span class="logo-text">Vera</span>
                </div>
            </div>
            <div class="header-center">
                <div class="listen-mode-selector" id="listenModeSelector">
                    <button class="mode-btn" data-mode="push" title="Push to talk">🔇 Push</button>
                    <button class="mode-btn" data-mode="wake" title="Wake word (Hey Vera)">🎙️ Wake</button>
                    <button class="mode-btn active" data-mode="always" title="Always listening">📡 Always</button>
                </div>
                <select class="lang-selector" id="langSelector" title="Language">
                    <option value="en">🇺🇸 EN</option>
                    <option value="es">🇪🇸 ES</option>
                    <option value="fr">🇫🇷 FR</option>
                    <option value="de">🇩🇪 DE</option>
                    <option value="hi">🇮🇳 HI</option>
                    <option value="te">🇮🇳 TE</option>
                    <option value="ja">🇯🇵 JA</option>
                    <option value="ko">🇰🇷 KO</option>
                    <option value="zh">🇨🇳 ZH</option>
                    <option value="pt">🇧🇷 PT</option>
                    <option value="ar">🇸🇦 AR</option>
                    <option value="it">🇮🇹 IT</option>
                    <option value="ru">🇷🇺 RU</option>
                </select>
            </div>
            <div class="header-right">
                <select class="model-selector" id="modelSelector" title="Model">
                    <option value="">🤖 Auto</option>
                </select>
                <div class="connection-badge" id="connectionBadge">
                    <span class="dot"></span>
                    <span class="label">Connecting…</span>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Left Column: Face + Chat -->
            <div class="left-column">
                <!-- Face Panel -->
                <div class="glass-panel face-panel">
                    <div class="face-glow-ring" id="faceGlowRing">
                        <div id="faceCanvas"></div>
                    </div>
                    <div class="waveform-container">
                        <canvas id="waveformCanvas"></canvas>
                    </div>
                    <div class="expression-label" id="expressionLabel">idle</div>
                </div>

                <!-- Chat Panel -->
                <div class="glass-panel chat-panel">
                    <div class="chat-messages" id="chatMessages">
                        <div class="system-message">
                            <span class="system-icon">✨</span>
                            Hey there! 👋 I'm Vera, your AI buddy. Tell me your name and let's get started!
                        </div>
                    </div>

                    <div class="typing-indicator" id="typingIndicator" hidden>
                        <div class="typing-dots">
                            <span class="dot-1"></span>
                            <span class="dot-2"></span>
                            <span class="dot-3"></span>
                        </div>
                        <span class="typing-label">Vera is thinking…</span>
                    </div>
                </div>
            </div>

            <!-- Right Column: Agent Panel -->
            <div class="right-column" id="agentPanel">
                <div class="glass-panel agent-panel">
                    <div class="agent-panel-header">
                        <h2>👁️ Agents</h2>
                        <div class="view-switcher" id="viewSwitcher">
                            <button class="view-btn active" data-view="cards" title="Card View">◉</button>
                            <button class="view-btn" data-view="timeline" title="Timeline">☰</button>
                            <button class="view-btn" data-view="graph" title="Constellation">✦</button>
                            <button class="view-btn" data-view="pipeline" title="Pipeline">⬡</button>
                        </div>
                        <button class="panel-toggle" id="toggleAgentPanel" title="Toggle panel">◀</button>
                    </div>
                    <div class="agent-view-container" id="agentViewContainer">
                        <div class="agent-placeholder">
                            <span class="placeholder-icon">🤖</span>
                            <span>Agents will appear here when active…</span>
                        </div>
                    </div>
                </div>

                <!-- Dashboard Stats (collapsed in agent panel) -->
                <div class="glass-panel stats-panel">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon">⏱</div>
                            <div class="stat-info">
                                <span class="stat-value" id="statUptime">0s</span>
                                <span class="stat-label">Uptime</span>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">💬</div>
                            <div class="stat-info">
                                <span class="stat-value" id="statMessages">0</span>
                                <span class="stat-label">Messages</span>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">🧠</div>
                            <div class="stat-info">
                                <span class="stat-value" id="memFacts">0</span>
                                <span class="stat-label">Facts</span>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">📡</div>
                            <div class="stat-info">
                                <span class="stat-value" id="statConnection">—</span>
                                <span class="stat-label">Status</span>
                            </div>
                        </div>
                    </div>

                    <!-- Tier Distribution -->
                    <div class="tier-section">
                        <div class="tier-bar">
                            <span class="tier-label">T0</span>
                            <div class="bar-track"><div class="bar-fill tier-0" id="tierBar0" style="width:0%"></div></div>
                            <span class="tier-count" id="tierCount0">0</span>
                        </div>
                        <div class="tier-bar">
                            <span class="tier-label">T1</span>
                            <div class="bar-track"><div class="bar-fill tier-1" id="tierBar1" style="width:0%"></div></div>
                            <span class="tier-count" id="tierCount1">0</span>
                        </div>
                        <div class="tier-bar">
                            <span class="tier-label">T2</span>
                            <div class="bar-track"><div class="bar-fill tier-2" id="tierBar2" style="width:0%"></div></div>
                            <span class="tier-count" id="tierCount2">0</span>
                        </div>
                        <div class="tier-bar">
                            <span class="tier-label">T3</span>
                            <div class="bar-track"><div class="bar-fill tier-3" id="tierBar3" style="width:0%"></div></div>
                            <span class="tier-count" id="tierCount3">0</span>
                        </div>
                    </div>

                    <!-- Memory Stats -->
                    <div class="memory-section">
                        <div class="stat-row">
                            <span class="stat-label">Working</span>
                            <span class="stat-value" id="memWorking">0 turns</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Episodic</span>
                            <span class="stat-value" id="memEpisodic">0</span>
                        </div>
                        <div class="facts-list" id="factsList"></div>
                    </div>

                    <!-- Event Log -->
                    <div class="event-log-section">
                        <h3>Event Log</h3>
                        <div class="event-log" id="eventLog">
                            <div class="placeholder-text">Waiting for events…</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Bar -->
        <div class="glass-input-bar">
            <button class="mic-btn" id="micBtn" title="Toggle microphone">
                <span class="mic-icon">🎤</span>
                <span class="mic-ripple"></span>
            </button>
            <input
                type="text"
                id="chatInput"
                placeholder="Type a message…"
                autocomplete="off"
            >
            <button class="send-btn" id="sendBtn" title="Send message">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
            <button class="tts-btn active" id="ttsBtn" title="Toggle voice output">
                <span class="tts-icon">🔊</span>
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.162.0/three.min.js"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"></script>
    <script>
        if (typeof THREE === "undefined") {
            console.warn("[Vera] Three.js CDN failed, loading local fallback");
            document.write('<script src="/static/lib/three.min.js"><\/script>');
        }
    </script>
    <script src="/static/face.js"></script>
    <script src="/static/waveform.js"></script>
    <script src="/static/listener.js"></script>
    <script src="/static/agents-view.js"></script>
    <script src="/static/pipeline-view.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script src="/static/diagram-viewer.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
